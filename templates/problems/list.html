{% extends "base.html" %}
{% load static %}

{% block content %}
<div class="container py-4">

  <div class="text-center mb-4">
      <h2 class="fw-semibold mb-1" style="font-weight:500;">🧠 Ngân hàng Bài Toán</h2>
      <p class="text-muted" style="font-weight:300;">Khám phá – Luyện tập – Nâng cấp tư duy thuật toán 🚀</p>
  </div>

  <!-- Bộ lọc -->
  <form id="filter-form" method="get" class="row gy-2 gx-2 mb-4 align-items-center">
      <div class="col-md-3">
          <input type="text" name="q" value="{{ search_query }}" placeholder="🔍 Tìm theo tên hoặc mã bài..."
                 class="form-control rounded-pill border-0 shadow-sm px-3" style="font-weight:300;">
      </div>

      <div class="col-md-2">
          <select name="tag" class="form-select rounded-pill border-0 shadow-sm px-3" style="font-weight:300;">
              <option value="">🏷 Chủ đề</option>
              {% for tag in tags %}
              <option value="{{ tag.slug }}" {% if tag.slug == selected_tag %}selected{% endif %}>{{ tag.name }}</option>
              {% endfor %}
          </select>
      </div>

      <div class="col-md-2">
          <select name="difficulty" class="form-select rounded-pill border-0 shadow-sm px-3" style="font-weight:300;">
              <option value="">🎯 Độ khó</option>
              {% for d in difficulty_levels %}
              <option value="{{ d }}" {% if d == selected_difficulty %}selected{% endif %}>{{ d }}</option>
              {% endfor %}
          </select>
      </div>

      <div class="col-md-2">
          <select name="sort" class="form-select rounded-pill border-0 shadow-sm px-3" style="font-weight:300;">
              <option value="">⚙️ Sắp xếp</option>
              <option value="difficulty" {% if sort_by == "difficulty" %}selected{% endif %}>Theo độ khó</option>
              <option value="popularity" {% if sort_by == "popularity" %}selected{% endif %}>Theo độ phổ biến</option>
          </select>
      </div>

      <div class="col-md-3 d-flex justify-content-end gap-2">
          <button class="btn btn-primary rounded-pill px-4 shadow-sm" style="font-weight:400;">Áp dụng</button>
          <a href="/problems/" class="btn btn-outline-secondary rounded-pill px-4 shadow-sm" style="font-weight:400;">Reset</a>
      </div>
  </form>

  <!-- Danh sách bài toán -->
  <div id="problems-container" class="card border-0 shadow-sm rounded-4 overflow-hidden position-relative">
      <div id="spinner" class="position-absolute top-50 start-50 translate-middle text-center" style="display:none;">
        <div class="spinner-border text-primary" role="status" style="width:2.5rem; height:2.5rem;"></div>
        <div class="text-muted small mt-2">Đang tải...</div>
      </div>

      <div id="problems-table" class="table-responsive">
          {% include "problems/partials/_problem_table.html" %}
      </div>
  </div>

</div>

<!-- ======================= -->
<!-- 💫 AJAX FILTER SCRIPT -->
<!-- ======================= -->
<script>
document.addEventListener("DOMContentLoaded", () => {
    const spinner = document.getElementById("spinner");
    const table = document.getElementById("problems-table");

    // Khi click vào tag (có class .ajax-tag)
    document.addEventListener("click", async (e) => {
        if (e.target.classList.contains("ajax-tag")) {
            e.preventDefault();
            const url = e.target.getAttribute("href");
            spinner.style.display = "block";
            table.style.opacity = "0.3";

            try {
                const res = await fetch(url, { headers: { "X-Requested-With": "XMLHttpRequest" } });
                const html = await res.text();
                table.innerHTML = html;
            } catch (err) {
                console.error("Lỗi khi tải tag:", err);
            } finally {
                spinner.style.display = "none";
                table.style.opacity = "1";
            }
        }
    });
});
</script>

<style>
body, .table, .form-control, .form-select, .btn { font-family: "Inter", "Roboto", sans-serif; font-weight: 300; }
.table-hover tbody tr:hover, .hover-row:hover { background-color:#f8fafc !important; transition:0.2s; }
.hover-underline:hover { text-decoration: underline!important; }
.card { border-radius: 14px!important; }
.badge.bg-success-subtle { background-color:#e6f4ea!important; }
.badge.bg-warning-subtle { background-color:#fff4e5!important; }
.badge.bg-danger-subtle  { background-color:#fdeaea!important; }
.page-link { border:none!important; color:#333!important; font-weight:300; }
.page-item.active .page-link { background-color:#0d6efd!important; color:white!important; }
.badge { font-weight:400!important; }
</style>
{% endblock %}
