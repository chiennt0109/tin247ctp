{% extends "base.html" %}
{% block content %}
<h2>Student analytics</h2>
<form method="get" class="mb-3 d-flex gap-2">
  <input type="text" name="q" value="{{ q }}" placeholder="Search username" class="form-control" style="max-width:280px;">
  <input type="number" step="1" name="min_rating" value="{{ min_rating }}" placeholder="Min rating" class="form-control" style="max-width:180px;">
  <button class="btn btn-primary" type="submit">Search</button>
</form>
<table class="table table-striped">
<tr><th>Username</th><th>Submissions</th><th>Rating</th><th>Profile</th></tr>
{% for s in students %}
<tr>
  <td>{{ s.username }}</td>
  <td>{{ s.total_submissions }}</td>
  <td>{{ s.rating }}</td>
  <td><a class="btn btn-sm btn-outline-primary" href="{% url 'learning_analytics:user_learning_profile' s.id %}">Open learning profile</a></td>
</tr>
{% empty %}
<tr><td colspan="4">No students found.</td></tr>
{% endfor %}
</table>
{% endblock %}
